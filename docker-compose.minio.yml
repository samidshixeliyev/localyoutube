# Standalone MinIO stack for local / testing.
#
# Run separately from the main app (start this FIRST or the app will retry):
#   docker compose -f docker-compose.minio.yml up -d
#   docker compose up -d
#
# Both stacks join the shared `modtube-net` network, so the app reaches MinIO at
# http://minio:9000 (the default MINIO_ENDPOINT) by service name — they no longer
# need to be in the same compose project or rely on host.docker.internal.
#
# In PRODUCTION you don't need this file at all — point MINIO_ENDPOINT in your
# .env at your existing MinIO and set real credentials.

services:
  minio:
    image: minio/minio:latest
    container_name: modtube-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "0.0.0.0:9000:9000"   # S3 API
      - "0.0.0.0:9001:9001"   # web console
    volumes:
      - ${DATA_ROOT:-/opt/modtube/data}/minio:/data
    networks:
      - modtube-net

# Same fixed-name network as docker-compose.yml so the two stacks share it
# regardless of compose project name.
networks:
  modtube-net:
    name: modtube-net
