[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
loglevel=info

# NOTE: every program streams its stdout+stderr to the container's stdout
# (/dev/fd/1) so `docker logs modtube` shows ALL service logs (spring, postgres,
# prometheus, node_exporter) — not just supervisord's own messages.
# Video-meeting media runs in a separate LiveKit SFU container (no coturn here).

[program:postgresql]
command=su -s /bin/bash postgres -c "/usr/lib/postgresql/16/bin/postgres -D %(ENV_PGDATA)s"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
environment=PGDATA="%(ENV_PGDATA)s"

[program:node_exporter]
command=/opt/node_exporter/node_exporter
    --web.listen-address=0.0.0.0:9100
    --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|run)($|/)
autostart=true
autorestart=true
priority=12
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:prometheus]
command=/opt/prometheus/prometheus
    --config.file=/etc/prometheus/prometheus.yml
    --storage.tsdb.path=/var/lib/prometheus
    --storage.tsdb.retention.time=30d
    --storage.tsdb.wal-compression
    --web.listen-address=0.0.0.0:9090
autostart=true
autorestart=true
priority=15
startsecs=5
startretries=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:spring]
command=/start-spring.sh
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
startretries=5
startsecs=15
