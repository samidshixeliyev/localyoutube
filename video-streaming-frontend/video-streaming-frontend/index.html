<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   connect-src 'self' blob:;
                   img-src 'self' data: blob:;
                   media-src 'self' blob:;
                   script-src 'self' 'unsafe-inline' 'unsafe-eval';
                   style-src 'self' 'unsafe-inline';
                   font-src 'self' data:;
                   worker-src blob: 'self';">
    
    <title>ModTube</title>
  </head>
  <body>
    <!-- Apply dark class before React mounts to prevent flash of wrong theme -->
    <script>
      (function(){
        var s=localStorage.getItem('theme');
        var p=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
        if(s==='dark'||(s===null&&p)){document.documentElement.classList.add('dark');}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
