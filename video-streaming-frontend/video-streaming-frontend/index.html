<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='6' fill='%231a1f14'/%3E%3Cpath d='M20 3 L35 8 L35 21 C35 30 20 37 20 37 C20 37 5 30 5 21 L5 8 Z' fill='%234a5a3a'/%3E%3Cpath d='M20 6 L32 10.5 L32 21 C32 28.5 20 34.5 20 34.5 C20 34.5 8 28.5 8 21 L8 10.5 Z' fill='%233a4a2e'/%3E%3Cpath d='M16 14 L16 27 L28 20.5 Z' fill='%23c4a86a'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   connect-src 'self';
                   img-src 'self' data: blob:;
                   media-src 'self' blob:;
                   script-src 'self' 'unsafe-inline' 'unsafe-eval';
                   style-src 'self' 'unsafe-inline';
                   font-src 'self' data:;">
    
    <title>ModTube</title>
  </head>
  <body>
    <!-- Apply dark class before React mounts to prevent flash of wrong theme -->
    <script>
      (function(){
        var s=localStorage.getItem('theme');
        var p=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
        if(s==='dark'||(s===null&&p)){document.documentElement.classList.add('dark');}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
