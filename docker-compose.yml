services:
  modtube:
    build:
      context: .
      dockerfile: Dockerfile
    image: ao-images/modtube:latest
    container_name: modtube
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:4000"
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      # ── PostgreSQL (internal) ─────────────────────────────────────────
      PGDATA: /var/lib/postgresql/data
      PGUSER: postgres
      PGDB: modtube
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/modtube
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ""
      # ── JWT ───────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-min-32-chars}
      # ── Admin seed account ────────────────────────────────────────────
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@modtube.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # ── IDP (AO ID) ───────────────────────────────────────────────────
      # Set IDP_HOST and APP_HOST in .env — all IDP URLs are built from them.
      IDP_BASE_URL: https://${IDP_HOST:-localhost}
      IDP_CLIENT_ID: ${IDP_CLIENT_ID:-EFxbQK-ekDX1OkWov51cjg}
      IDP_REDIRECT_URI: http://${APP_HOST:-localhost}:${APP_PORT:-4000}/
      IDP_LOGOUT_REDIRECT_URI: http://${APP_HOST:-localhost}:${APP_PORT:-4000}/logged_out
      IDP_JWKS_URI: https://${IDP_HOST:-localhost}/jwks
      IDP_ISSUER: ${IDP_ISSUER:-https://auth.ao.az}
      IDP_SKIP_SSL: ${IDP_SKIP_SSL:-true}
      # ── Grafana ───────────────────────────────────────────────────────
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # ── Rate limiting ─────────────────────────────────────────────
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_UPLOAD_RPS: ${RATE_LIMIT_UPLOAD_RPS:-4}
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEM_LIMIT:-3G}
        reservations:
          cpus: '0.5'
          memory: 1G
    volumes:
      # All persistent data lives under DATA_ROOT on the host.
      # Set DATA_ROOT in .env to any path and give it full permissions.
      - ${DATA_ROOT:-/opt/modtube/data}/videos:/data
      - ${DATA_ROOT:-/opt/modtube/data}/pgdata:/var/lib/postgresql/data
      - ${DATA_ROOT:-/opt/modtube/data}/grafana:/var/lib/grafana
      - ${DATA_ROOT:-/opt/modtube/data}/prometheus:/var/lib/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
