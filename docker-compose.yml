services:
  modtube:
    build:
      context: .
      dockerfile: Dockerfile
    image: ao-images/modtube:latest
    container_name: modtube
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
      - "0.0.0.0:8443:443"
      - "0.0.0.0:${APP_PORT:-4000}:4000"   # direct Spring Boot access (debug / internal)
    environment:
      # ── PostgreSQL (internal) ─────────────────────────────────────────
      PGDATA: /var/lib/postgresql/data
      PGUSER: postgres
      PGDB: modtube
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/modtube
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ""
      # ── JWT ───────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-min-32-chars}
      # ── Admin seed account ────────────────────────────────────────────
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@modtube.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # ── Host / public URL ─────────────────────────────────────────────
      # APP_HOST is passed into the container so docker-entrypoint.sh can
      # include it in the self-signed TLS certificate SAN.
      # PUBLIC_BASE_URL is the full https URL used for IDP OAuth2 callbacks.
      APP_HOST: ${APP_HOST:-localhost}
      # ── IDP (AO ID) ───────────────────────────────────────────────────
      IDP_BASE_URL: https://${IDP_HOST:-localhost}
      IDP_CLIENT_ID: ${IDP_CLIENT_ID:-EFxbQK-ekDX1OkWov51cjg}
      IDP_REDIRECT_URI: ${PUBLIC_BASE_URL:-https://localhost}/
      IDP_LOGOUT_REDIRECT_URI: ${PUBLIC_BASE_URL:-https://localhost}/logged_out
      IDP_JWKS_URI: https://${IDP_HOST:-localhost}/jwks
      IDP_ISSUER: ${IDP_ISSUER:-https://auth.ao.az}
      IDP_SKIP_SSL: ${IDP_SKIP_SSL:-true}
      # ── Rate limiting ─────────────────────────────────────────────────
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_UPLOAD_RPS: ${RATE_LIMIT_UPLOAD_RPS:-4}
      # ── WebRTC (video meetings) ────────────────────────────────────────
      WEBRTC_ICE_SERVERS: ${WEBRTC_ICE_SERVERS:-stun:stun.l.google.com:19302}
      WEBRTC_TURN_URL: ${WEBRTC_TURN_URL:-}
      WEBRTC_TURN_USERNAME: ${WEBRTC_TURN_USERNAME:-}
      WEBRTC_TURN_CREDENTIAL: ${WEBRTC_TURN_CREDENTIAL:-}
      # ── Object storage (MinIO) ─────────────────────────────────────────
      # In production, point MINIO_ENDPOINT at your existing MinIO and set
      # real credentials. Defaults below target the bundled test `minio` service.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-modtube}
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEM_LIMIT:-3G}
        reservations:
          cpus: '0.5'
          memory: 1G
    volumes:
      # All persistent data lives under DATA_ROOT on the host.
      # Set DATA_ROOT in .env to any path and give it full permissions.
      - ${DATA_ROOT:-/opt/modtube/data}/videos:/data
      - ${DATA_ROOT:-/opt/modtube/data}/pgdata:/var/lib/postgresql/data
      - ${DATA_ROOT:-/opt/modtube/data}/prometheus:/var/lib/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # MinIO runs as a separate stack (docker-compose.minio.yml) or your existing
    # production MinIO. Reached via the host gateway by default; override
    # MINIO_ENDPOINT to point anywhere.
    extra_hosts:
      - "host.docker.internal:host-gateway"
