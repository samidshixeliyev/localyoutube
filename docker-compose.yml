services:
  modtube:
    build:
      context: .
      dockerfile: Dockerfile
    image: modtube:latest
    container_name: modtube
    restart: unless-stopped
    ports:
      - "4000:8080"   # Spring Boot — frontend + API
      - "3000:3000"   # Grafana
    environment:
      # PostgreSQL (internal)
      PGDATA: /var/lib/postgresql/data
      PGUSER: postgres
      PGDB: modtube
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/modtube
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ""
      # JWT
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production-min-32-chars}
      # ModTube admin seed
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@modtube.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # AO IDP (set these in .env or override at deploy time)
      IDP_BASE_URL: ${IDP_BASE_URL:-https://13.61.159.58}
      IDP_CLIENT_ID: ${IDP_CLIENT_ID:-EFxbQK-ekDX1OkWov51cjg}
      IDP_REDIRECT_URI: ${IDP_REDIRECT_URI:-http://13.61.159.58:4000/}
      IDP_LOGOUT_REDIRECT_URI: ${IDP_LOGOUT_REDIRECT_URI:-http://13.61.159.58:4000/logged_out}
      IDP_JWKS_URI: ${IDP_JWKS_URI:-https://13.61.159.58/jwks}
      IDP_ISSUER: ${IDP_ISSUER:-https://auth.ao.az}
      IDP_SKIP_SSL: ${IDP_SKIP_SSL:-true}
      # Grafana
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      # ── All persistent data under a single base path ──────────────
      # Change DATA_ROOT in .env or on the command-line to relocate
      # everything at once:   DATA_ROOT=/mnt/data docker compose up -d
      - ${DATA_ROOT:-/opt/modtube/data}/videos:/data
      - ${DATA_ROOT:-/opt/modtube/data}/pgdata:/var/lib/postgresql/data
      - ${DATA_ROOT:-/opt/modtube/data}/grafana:/var/lib/grafana
      - ${DATA_ROOT:-/opt/modtube/data}/prometheus:/var/lib/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
