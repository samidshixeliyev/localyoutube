services:
  modtube:
    build:
      context: .
      dockerfile: Dockerfile
    image: ao-images/modtube:latest
    container_name: modtube
    restart: unless-stopped
    ports:
      # App (API + built SPA). Put your own nginx in front of this for TLS.
      # Video-meeting media is served by the separate LiveKit SFU (docker-compose.livekit.yml).
      - "0.0.0.0:${APP_PORT:-4000}:4000"
    environment:
      # ── PostgreSQL (internal) ─────────────────────────────────────────
      PGDATA: /var/lib/postgresql/data
      PGUSER: postgres
      PGDB: modtube
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/modtube
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ""
      # DB connection pool — sized for ~4 cores (HikariCP ≈ cores × 2).
      DB_POOL_MAX: ${DB_POOL_MAX:-12}
      DB_POOL_MIN: ${DB_POOL_MIN:-4}
      # Logging — all visible via `docker logs`. Crank these for full verbosity:
      #   LOG_LEVEL_ROOT=DEBUG  (everything),  LOG_LEVEL_SQL=DEBUG  (SQL), etc.
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-DEBUG}
      LOG_LEVEL_WEB: ${LOG_LEVEL_WEB:-INFO}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY:-INFO}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL:-INFO}
      # ── JWT ───────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-min-32-chars}
      # ── Admin seed account ────────────────────────────────────────────
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@modtube.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # ── Host / public URL ─────────────────────────────────────────────
      # APP_HOST is passed into the container so docker-entrypoint.sh can
      # include it in the self-signed TLS certificate SAN.
      # PUBLIC_BASE_URL is the full https URL used for IDP OAuth2 callbacks.
      APP_HOST: ${APP_HOST:-localhost}
      # ── IDP (AO ID) ───────────────────────────────────────────────────
      IDP_BASE_URL: https://${IDP_HOST:-localhost}
      IDP_CLIENT_ID: ${IDP_CLIENT_ID:-EFxbQK-ekDX1OkWov51cjg}
      IDP_REDIRECT_URI: ${PUBLIC_BASE_URL:-https://localhost}/
      IDP_LOGOUT_REDIRECT_URI: ${PUBLIC_BASE_URL:-https://localhost}/logged_out
      IDP_JWKS_URI: https://${IDP_HOST:-localhost}/jwks
      IDP_ISSUER: ${IDP_ISSUER:-https://auth.ao.az}
      IDP_SKIP_SSL: ${IDP_SKIP_SSL:-true}
      # ── Rate limiting ─────────────────────────────────────────────────
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_UPLOAD_RPS: ${RATE_LIMIT_UPLOAD_RPS:-4}
      # ── Video meetings (SFU) ───────────────────────────────────────────
      # Media goes through a SEPARATE LiveKit SFU container (docker-compose.livekit.yml).
      # Register the runner(s) at runtime under Admin → Görüş Serverləri (URL + API
      # key/secret stored in the DB). Only the per-room participant cap is set here.
      WEBRTC_MAX_PARTICIPANTS: ${WEBRTC_MAX_PARTICIPANTS:-50}
      # ── Object storage (MinIO) ─────────────────────────────────────────
      # In production, point MINIO_ENDPOINT at your existing MinIO and set
      # real credentials. Default targets the `minio` service on the shared
      # `modtube-net` network (docker-compose.minio.yml). Both stacks must join it.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-modtube}
      # Optional — only for region-aware S3 backends (real AWS S3). Blank for MinIO.
      MINIO_REGION: ${MINIO_REGION:-}
      # HTTPS MinIO with a custom/self-signed cert: mount the PEM (see volumes) and set
      # its in-container path here so the app trusts it. Or MINIO_INSECURE=true to skip.
      MINIO_CA_CERT: ${MINIO_CA_CERT:-}
      MINIO_INSECURE: ${MINIO_INSECURE:-false}
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEM_LIMIT:-3G}
        reservations:
          cpus: '0.5'
          memory: 1G
    volumes:
      # All persistent data lives under DATA_ROOT on the host.
      # Set DATA_ROOT in .env to any path and give it full permissions.
      - ${DATA_ROOT:-/opt/modtube/data}/videos:/data
      - ${DATA_ROOT:-/opt/modtube/data}/pgdata:/var/lib/postgresql/data
      - ${DATA_ROOT:-/opt/modtube/data}/prometheus:/var/lib/prometheus
      # For an HTTPS MinIO with a custom cert: mount the PEM read-only and set
      # MINIO_CA_CERT=/certs/minio-ca.pem in your .env. Uncomment + adjust the host path:
      # - ${MINIO_CA_CERT_HOST:-./minio-ca.pem}:/certs/minio-ca.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # MinIO runs as a separate stack (docker-compose.minio.yml) but MUST share the
    # `modtube-net` network below so the app can reach it at http://minio:9000.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - modtube-net

# Shared network so the app + the separate MinIO stack can resolve each other by
# service name. Both compose files declare it with the same fixed name, so whichever
# starts first creates it and the other joins it.
networks:
  modtube-net:
    name: modtube-net
