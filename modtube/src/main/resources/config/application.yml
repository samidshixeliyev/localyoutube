server:
  port: ${SERVER_PORT:4000}
  address: 0.0.0.0
  tomcat:
    max-swallow-size: 200MB
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: modtube

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/modtube}
    username: ${SPRING_DATASOURCE_USERNAME:modtube}
    password: ${SPRING_DATASOURCE_PASSWORD:modtube123}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Right-sized for a ~4-core box (HikariCP guidance ≈ cores × 2). A bigger
      # pool only adds contention. The real fix for "connection not available"
      # is not holding connections during slow I/O (SSE push is now after-commit).
      maximum-pool-size: ${DB_POOL_MAX:12}
      minimum-idle: ${DB_POOL_MIN:4}
      connection-timeout: 10000
      # Warn early if any connection is held too long (future regression guard).
      leak-detection-threshold: 15000
      max-lifetime: 1800000
      keepalive-time: 300000

  jpa:
    # CRITICAL: with OSIV on (the default), every request — including each
    # long-lived SSE notification stream — holds a DB connection for the whole
    # request, exhausting the pool under light parallelism. Safe to disable here:
    # no entity uses lazy associations (only EAGER @ElementCollection on Video).
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 55MB       # per chunk — frontend sends up to 50MB chunks for large files
      max-request-size: 60MB

jwt:
  secret: ${JWT_SECRET:4gTduyxJahQatgIkxwGErvADeIjfdulxI98B8bAGUOKStnBVTyngXfU5jM1rMbVR}

modtube:
  storage:
    # Local dirs are now scratch space for chunk assembly + FFmpeg working files.
    # Final HLS segments and thumbnails are pushed to MinIO and served from there.
    upload-dir: ${UPLOAD_DIR:/data/uploads}
    hls-dir: ${HLS_DIR:/data/hls}
    temp-dir: ${TEMP_DIR:/data/temp}
    thumbnail-dir: ${THUMBNAIL_DIR:/data/thumbnails}
    max-file-size: 53687091200
    min-disk-free: 5368709120
    allowed-extensions: mp4,mkv,avi,mov,wmv,flv,webm
    minio:
      endpoint:   ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket:     ${MINIO_BUCKET:modtube}
      # Optional — only for region-aware S3 backends (real AWS S3 etc.). Blank for MinIO.
      region:     ${MINIO_REGION:}
      # HTTPS MinIO with a custom/self-signed cert: path to the CA/server PEM the app
      # should trust. Mount the PEM into the container and point here. Blank = JVM default.
      ca-cert:    ${MINIO_CA_CERT:}
      # Skip TLS verification entirely (use only if you can't provide a CA cert).
      insecure:   ${MINIO_INSECURE:false}

  transcoding:
    segment-duration: 6
    qualities: 480p,720p,1080p,1440p,2160p

  webrtc:
    ice-servers: ${WEBRTC_ICE_SERVERS:stun:stun.l.google.com:19302}
    turn-url: ${WEBRTC_TURN_URL:}
    turn-username: ${WEBRTC_TURN_USERNAME:}
    turn-credential: ${WEBRTC_TURN_CREDENTIAL:}
    # Max participants per meeting room. Mesh WebRTC is heavy past a handful of
    # peers; adaptive quality (frontend) lowers per-peer bitrate as the room
    # grows so a fast LAN can sustain larger calls. 0 = unlimited (not advised).
    max-participants: ${WEBRTC_MAX_PARTICIPANTS:30}

  idp:
    base-url: ${IDP_BASE_URL:https://13.61.159.58}
    client-id: ${IDP_CLIENT_ID:EFxbQK-ekDX1OkWov51cjg}
    jwks-uri: ${IDP_JWKS_URI:https://13.61.159.58/jwks}
    issuer: ${IDP_ISSUER:https://auth.ao.az}
    skip-ssl-verify: ${IDP_SKIP_SSL:true}
    redirect-uri: ${IDP_REDIRECT_URI:http://13.61.159.58:4000/}
    logout-redirect-uri: ${IDP_LOGOUT_REDIRECT_URI:http://13.61.159.58:4000/logged_out}

  admin:
    email: ${ADMIN_EMAIL:admin@modtube.local}
    password: ${ADMIN_PASSWORD:changeme}

logging:
  level:
    # All levels env-tunable. Set LOG_LEVEL_ROOT=DEBUG to see EVERYTHING (very verbose);
    # default keeps framework noise at INFO but our own code + web/security at DEBUG.
    root: ${LOG_LEVEL_ROOT:INFO}
    ao.az.modtube: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{40} : %msg%n"
  charset:
    console: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      # Expose liveness/readiness groups so the container healthcheck can hit a
      # lightweight liveness probe instead of the full DB-touching health check.
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
