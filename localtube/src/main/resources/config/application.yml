server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  tomcat:
    max-swallow-size: 100MB

spring:
  application:
    name: localtube

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localtube}
    username: ${SPRING_DATASOURCE_USERNAME:localtube}
    password: ${SPRING_DATASOURCE_PASSWORD:localtube123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:4gTduyxJahQatgIkxwGErvADeIjfdulxI98B8bAGUOKStnBVTyngXfU5jM1rMbVR}

localtube:
  storage:
    upload-dir: ${UPLOAD_DIR:/data/uploads}
    hls-dir: ${HLS_DIR:/data/hls}
    temp-dir: ${TEMP_DIR:/data/temp}
    thumbnail-dir: ${THUMBNAIL_DIR:/data/thumbnails}
    max-file-size: 53687091200
    min-disk-free: 5368709120
    allowed-extensions: mp4,mkv,avi,mov,wmv,flv,webm

  transcoding:
    segment-duration: 6
    qualities: 480p,720p,1080p

  idp:
    base-url: ${IDP_BASE_URL:https://51.20.12.6}
    client-id: ${IDP_CLIENT_ID:EFxbQK-ekDX1OkWov51cjg}
    jwks-uri: ${IDP_JWKS_URI:https://51.20.12.6/jwks}
    issuer: ${IDP_ISSUER:https://auth.ao.az}
    skip-ssl-verify: ${IDP_SKIP_SSL:true}
    redirect-uri: ${IDP_REDIRECT_URI:http://51.20.12.6:4000/}
    logout-redirect-uri: ${IDP_LOGOUT_REDIRECT_URI:http://51.20.12.6:4000/logged_out}

  admin:
    email: ${ADMIN_EMAIL:admin@localtube.local}
    password: ${ADMIN_PASSWORD:changeme}

logging:
  level:
    root: INFO
    az.dev.localtube: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
