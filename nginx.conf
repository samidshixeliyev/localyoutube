user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Video uploads can be large
    client_max_body_size 0;

    upstream spring {
        server 127.0.0.1:4000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Explicitly allow camera + microphone on this origin
        add_header Permissions-Policy "camera=*, microphone=*, display-capture=*" always;

        # WebSocket — keep connection open indefinitely for WebRTC signaling
        location /ws/ {
            proxy_pass         http://spring;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   https;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # SSE (Server-Sent Events) — notifications stream
        # Connection: '' prevents nginx from forwarding keep-alive header,
        # which would break SSE chunked streaming through the proxy.
        location /api/notifications/stream {
            proxy_pass         http://spring;
            proxy_http_version 1.1;
            proxy_set_header   Connection         '';
            proxy_set_header   Host               $host;
            proxy_set_header   X-Forwarded-Proto  https;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
        }

        # HLS video segments — disable buffering so playback is smooth
        location /hls/ {
            proxy_pass         http://spring;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_buffering    off;
            proxy_cache        off;
        }

        # Everything else (API + static frontend)
        location / {
            proxy_pass         http://spring;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   https;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
